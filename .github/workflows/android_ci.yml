name: Android CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  android-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
          working-directory: day8/my_practice_app/android

      - name: Flutter dependencies
        working-directory: day8/my_practice_app
        run: flutter pub get

      - name: Run Fastlane CI
        working-directory: day8/my_practice_app/android
        run: bundle exec fastlane ci

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: day8/my_practice_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
